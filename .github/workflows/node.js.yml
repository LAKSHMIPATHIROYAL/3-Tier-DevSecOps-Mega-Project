name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: setup node.js 
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: frontend compilation (syntax check)
        run: |
          cd client
          find . -name "*.js"  -exec node --check {} +  #what this comaand exactly do? can you explain in detail?
  # The above command is used to perform a syntax check on all JavaScript files in the "client"
  # directory and its subdirectories. Here's a breakdown of the command:
  # 1. `find . -name "*.js"`: This part of the command searches for all files with a ".js" extension starting 
  #from the current directory (denoted by ".") and its subdirectories. It will return a list of all JavaScript files found.
  # 2. `-exec node --check {} +`: This part of the command executes the `node --check` command on each of the files found by the `find` command.
  # The `{}` is a placeholder that represents each file found by the `find` command. The `+` at the end allows for multiple files to be 
  #processed in a single command, which can be more efficient than running the command separately for each file.
      - name: backend compilation (syntax check)
        run: |
          cd api
          find . -name "*.js"  -exec node --check {} + 
  gitleaks-scan:
        runs-on: Agent-1
        needs: compile
        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: gitleaks setup
            uses: gitleaks/gitleaks-action@v2

          - name: Gitleaks Scan
            run: |
             gitleaks detect --source ./client --exit-code  1 
             gitleaks detect --source  ./api --exit-code  1
  trivy_fs_scan:
        runs-on: Agent-1
        needs: gitleaks-scan
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Run Trivy vulnerability scanner in fs mode
            uses: aquasecurity/trivy-action@v0.20.0
            with:
              scan-type: 'fs'
              scan-ref: '.'
              format: 'table'
              ignore-unfixed: true
              vuln_type: 'os,library'
              severity: 'CRITICAL,HIGH'
  sonar-frontend:
        runs-on: Agent-1
        needs: trivy_fs_scan
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: SonarCloud Scan for Frontend
            uses: sonarsource/sonarqube-scan-action@master
            with:
              projectBaseDir: client
              args: >
                -Dsonar.projectKey=myorg_client
                -Dsonar.projectName=myorg_client
                -Dsonar.sources=.
                -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
            env:
              SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sonar-backend:
        runs-on: Agent-1  
        needs: sonar-frontend
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: SonarCloud Scan for Backend
            uses: sonarsource/sonarqube-scan-action@master
            with:
              projectBaseDir: api
              args: >
                -Dsonar.projectKey=myorg_api
                -Dsonar.projectName=myorg_api
                -Dsonar.sources=.
                -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
            env:
              SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  build_backend_docker_image_push:
        runs-on: ubuntu-latest
        needs: sonar-backend
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Log in to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ vars.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Set up QEMU
            uses: docker/setup-qemu-action@v3
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
          - name: Build and push Docker image
            uses: docker/build-push-action@v6
            with:
               context: ./api
               push: true
               tags: LAKSHMIPATHIROYAL/backend:latest
               file: ./api/Dockerfile
  build_frontend_docker_image_push:
        runs-on: ubuntu-latest
        needs: build_backend_docker_image_push
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Log in to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ vars.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Set up QEMU
            uses: docker/setup-qemu-action@v3
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
          - name: Build and push Docker image
            uses: docker/build-push-action@v6
            with:
               context: ./client
               push: true
               tags: LAKSHMIPATHIROYAL/frontend:latest
               file: ./client/Dockerfile
          
